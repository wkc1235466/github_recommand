services:
  mongodb:
    image: mongo:7.0
    container_name: github_recommend_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: github_recommend
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: github_recommend_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=github_recommend
      - DEBUG=true
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend:ro

volumes:
  mongodb_data: